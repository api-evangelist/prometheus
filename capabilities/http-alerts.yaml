naftiko: 1.0.0-alpha2
info:
  label: Prometheus HTTP API — Alerts
  description: 'Prometheus HTTP API — Alerts. 1 operations. Lead operation: Prometheus Get alerts. Self-contained Naftiko
    capability covering one Prometheus business surface.'
  tags:
  - Prometheus
  - Alerts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PROMETHEUS_API_KEY: PROMETHEUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-alerts
    baseUri: http://{host}:{port}
    description: Prometheus HTTP API — Alerts business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-alerts
      path: /api/v1/alerts
      operations:
      - name: getalerts
        method: GET
        description: Prometheus Get alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: http-alerts-rest
    port: 8080
    description: REST adapter for Prometheus HTTP API — Alerts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v1/alerts
      name: api-v1-alerts
      description: REST surface for api-v1-alerts.
      operations:
      - method: GET
        name: getalerts
        description: Prometheus Get alerts
        call: http-alerts.getalerts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: http-alerts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Prometheus HTTP API — Alerts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: prometheus-get-alerts
      description: Prometheus Get alerts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: http-alerts.getalerts
      outputParameters:
      - type: object
        mapping: $.
