naftiko: 1.0.0-alpha2
info:
  label: Prometheus Alertmanager API — Status
  description: 'Prometheus Alertmanager API — Status. 1 operations. Lead operation: Prometheus Get Alertmanager status. Self-contained
    Naftiko capability covering one Prometheus business surface.'
  tags:
  - Prometheus
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PROMETHEUS_API_KEY: PROMETHEUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: alertmanager-status
    baseUri: http://{host}:{port}
    description: Prometheus Alertmanager API — Status business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-status
      path: /api/v2/status
      operations:
      - name: getstatus
        method: GET
        description: Prometheus Get Alertmanager status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: alertmanager-status-rest
    port: 8080
    description: REST adapter for Prometheus Alertmanager API — Status. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/status
      name: api-v2-status
      description: REST surface for api-v2-status.
      operations:
      - method: GET
        name: getstatus
        description: Prometheus Get Alertmanager status
        call: alertmanager-status.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: alertmanager-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for Prometheus Alertmanager API — Status. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: prometheus-get-alertmanager-status
      description: Prometheus Get Alertmanager status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: alertmanager-status.getstatus
      outputParameters:
      - type: object
        mapping: $.
