specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Prometheus
providerId: prometheus
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Observability
  - Monitoring
  - Open Source
  - Rate Limiting
description: Prometheus is self-hosted; there is no upstream rate-limit policy. Throughput is bounded
  by the operator's deployment — scrape interval, retention, query concurrency, remote-write throughput
  — all tunable via the Prometheus configuration file and command-line flags.
notes: As an Apache 2.0 self-hosted binary, Prometheus has no SaaS-vendor rate limits. The values that
  do exist are operator-tunable via `--query.max-concurrency`, `--query.max-samples`, scrape intervals,
  and remote-write queue settings.
sources:
  - https://prometheus.io/docs/prometheus/latest/configuration/configuration/
  - https://prometheus.io/docs/prometheus/latest/command-line/prometheus/
limits:
  - name: Operator-tuned query concurrency
    scope: instance
    metric: concurrent_requests
    limit: 'configured via --query.max-concurrency (default 20)'
  - name: Operator-tuned scrape interval
    scope: instance
    metric: varies
    limit: 'configured via global.scrape_interval'
policies:
  - name: Self-Hosted
    description: All throughput and concurrency limits are owned by the operator running the binary;
      there is no upstream throttler, no API key, and no per-tenant quota.
  - name: Remote-Write Backpressure
    description: When using remote_write, Prometheus enforces queue-based backpressure governed by the
      `queue_config` block (capacity, max_samples_per_send, max_shards) — not a vendor-side rate limit.
maintainers:
