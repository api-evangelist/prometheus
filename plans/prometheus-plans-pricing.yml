specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Prometheus
providerId: prometheus
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Observability
  - Monitoring
  - Open Source
  - CNCF
description: Prometheus is an open-source systems monitoring and alerting toolkit, originally built at
  SoundCloud and donated to the Cloud Native Computing Foundation in 2016. It is distributed under the
  Apache 2.0 license — there is no commercial entity, no pricing tier, no SaaS, and no metered API.
  Cost is whatever the operator pays to run it (compute, storage, network).
sources:
  - https://prometheus.io/docs/introduction/overview/
  - https://github.com/prometheus/prometheus
plans:
  - id: prometheus-open-source
    name: Open Source
    type: freemium
    description: Self-hosted Prometheus under the Apache 2.0 license. No license fee; no upstream commercial
      tier. Operating cost is borne entirely by the operator running the binary.
    entries:
      - label: License
        name: license
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Apache 2.0 License
      - name: Prometheus Server
      - name: Alertmanager
      - name: PromQL
      - name: Exporters
      - name: Community Support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
