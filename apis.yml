    url: capabilities/http-query.yaml
  - type: NaftikoCapability
    url: capabilities/http-rules.yaml
  - type: NaftikoCapability
    url: capabilities/http-status.yaml
  - type: NaftikoCapability
    url: capabilities/http-tsdb.yaml
  - type: NaftikoCapability
    url: capabilities/http-targets.yaml
- aid: prometheus:prometheus-management-api
  name: Prometheus Management API
  description: The Prometheus Management API provides administrative endpoints for managing a running Prometheus server, including
    configuration reloads, taking snapshots of the TSDB, cleaning tombstones, and graceful shutdown. These endpoints are disabled
    by default and require the --web.enable-lifecycle flag.
  humanURL: https://prometheus.io/docs/prometheus/latest/management_api/
  tags:
  - Administration
  - Management
  - Monitoring
  properties:
  - type: Documentation
    url: https://prometheus.io/docs/prometheus/latest/management_api/
  - type: OpenAPI
    url: openapi/prometheus-management-api-openapi.yml
  - type: NaftikoCapability
    url: capabilities/management-admin.yaml
  - type: NaftikoCapability
    url: capabilities/management-lifecycle.yaml
- aid: prometheus:prometheus-pushgateway-api
  name: Prometheus Pushgateway API
  description: The Pushgateway API accepts metrics pushed from short-lived batch jobs and ephemeral processes via HTTP PUT,
    POST, and DELETE requests. Metrics are organized by job and optional grouping labels, and are exposed for Prometheus scraping
    until explicitly deleted.
  humanURL: https://github.com/prometheus/pushgateway
  tags:
  - Batch Jobs
  - Metrics
  - Pushgateway
  properties:
  - type: Documentation
    url: https://github.com/prometheus/pushgateway/blob/master/README.md
  - type: OpenAPI
    url: openapi/prometheus-pushgateway-api-openapi.yml
  - type: GitHubRepository
    url: https://github.com/prometheus/pushgateway
  - type: ChangeLog
    url: https://github.com/prometheus/pushgateway/releases
  - type: NaftikoCapability
    url: capabilities/pushgateway-metrics.yaml
  - type: NaftikoCapability
    url: capabilities/pushgateway-status.yaml
- aid: prometheus:prometheus-alertmanager-api
  name: Prometheus Alertmanager API
  description: The Alertmanager API v2 provides HTTP endpoints for querying alert status, managing silences and inhibitions,
    retrieving receiver configurations, and checking cluster status. An OpenAPI 2.0 specification is available in the Alertmanager
    repository.
  humanURL: https://prometheus.io/docs/alerting/latest/alertmanager/
  tags:
  - Alerting
  - Notifications
  - Silences
  properties:
  - type: Documentation
    url: https://prometheus.io/docs/alerting/latest/alertmanager/
  - type: OpenAPI
