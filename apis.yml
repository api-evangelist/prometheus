aid: prometheus
name: Prometheus
description: An open-source systems monitoring and alerting toolkit originally built
  at SoundCloud. Prometheus collects and stores metrics as time series data and provides
  a powerful query language (PromQL) for analysis.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Monitoring
  - Metrics
  - Alerting
  - Time Series
  - Observability
url: >-
  https://raw.githubusercontent.com/api-evangelist/prometheus/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-03-16'
specificationVersion: '0.19'
