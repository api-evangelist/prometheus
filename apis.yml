aid: prometheus
name: Prometheus
description: An open-source systems monitoring and alerting toolkit originally built at SoundCloud. Prometheus collects and
  stores metrics as time series data and provides a powerful query language (PromQL) for analysis.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Alerting
- Metrics
- Monitoring
- Observability
- Time Series
url: https://raw.githubusercontent.com/api-evangelist/prometheus/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-05-19'
specificationVersion: '0.19'
apis:
- aid: prometheus:prometheus-http-api
  name: Prometheus HTTP API
  description: The Prometheus HTTP API provides endpoints for executing instant and range queries using PromQL, querying metadata
    such as labels and series, and managing targets and rules. The API is reachable under /api/v1 on a Prometheus server and
    returns JSON responses. An OpenAPI specification is served at /api/v1/openapi.yaml.
  humanURL: https://prometheus.io/docs/prometheus/latest/querying/api/
  tags:
  - Metrics
  - PromQL
  - Query
  - Time Series
  properties:
  - type: Documentation
    url: https://prometheus.io/docs/prometheus/latest/querying/api/
  - type: OpenAPI
    url: openapi/prometheus-http-api-openapi.yml
  - type: GitHubRepository
    url: https://github.com/prometheus/prometheus
  - type: ChangeLog
    url: https://github.com/prometheus/prometheus/blob/main/CHANGELOG.md
  - type: JSONSchema
    url: json-schema/prometheus-metrics-schema.json
