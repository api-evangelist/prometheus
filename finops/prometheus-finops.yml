specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Prometheus
providerId: prometheus
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Observability
  - Monitoring
  - Open Source
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Prometheus. Prometheus has no vendor invoice — it is Apache
  2.0 software. The FinOps surface is therefore the operator's own infrastructure cost (compute, storage,
  network) for running the server, exporters, and remote-write / long-term-storage backends.
notes: There is no Prometheus vendor billing. Cost lives in the underlying infrastructure provider (AWS,
  GCP, on-prem) and is observable via that provider's FOCUS export, not via Prometheus.
sources:
  - https://prometheus.io/docs/introduction/overview/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Cloud Native Computing Foundation
serviceCategory: Observability
billingModel:
  pricingCategory: Open Source
  billingFrequency: On-Demand
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: Prometheus
  ServiceCategory: Observability
  ProviderName: Prometheus
  PublisherName: Cloud Native Computing Foundation
  InvoiceIssuerName: 'n/a (self-hosted)'
  BillingCurrency: USD
meters:
  - name: compute_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - role
      - environment
  - name: persistent_storage
    unit: GB-month
    aggregation: max
    dimensions:
      - retention_tier
  - name: network_egress
    unit: GB
    aggregation: sum
    dimensions:
      - destination
principles:
  - name: Visibility
    description: Cost visibility comes from the infrastructure provider's FOCUS / billing export, not
      from Prometheus itself; Prometheus can however scrape and report its own resource consumption
      (process_resident_memory_bytes, prometheus_tsdb_head_series).
  - name: Allocation
    description: Allocate Prometheus infrastructure cost by Kubernetes namespace, team, or environment
      using cloud-provider tags; tenancy lives in your deployment topology, not in the binary.
  - name: Optimization
    description: Right-size scrape interval, retention, and series cardinality; offload long-term storage
      to remote_write (Thanos, Mimir, Cortex) and tune `queue_config`.
  - name: Accountability
    description: Spend is owned by the platform / SRE team operating the Prometheus stack; there is
      no vendor invoice.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
