overlay: 1.0.0
info:
  title: API Evangelist enhancements for Prometheus HTTP API
  version: 1.0.0
extends: openapi/prometheus-http-api-openapi.yml
actions:
  - target: $.info
    update:
      x-apievangelist-provider: prometheus
      x-apievangelist-api: prometheus-http-api
      x-apievangelist-artifacts:
        conventions: conventions/prometheus-conventions.yml
        errors: errors/prometheus-problem-types.yml
        lifecycle: lifecycle/prometheus-lifecycle.yml
        authentication: authentication/prometheus-authentication.yml
        data-model: data-model/prometheus-data-model.yml
  - target: $.info
    update:
      x-api-stability: >-
        The /api/v1 surface is stable within a Prometheus major version; the /alerts
        and /rules endpoints carry weaker guarantees. See
        https://prometheus.io/docs/prometheus/latest/stability/
