    name: prometheus-client
    url: https://pypi.org/project/prometheus-client/
    install: pip install prometheus-client
    source: https://github.com/prometheus/client_python
    official: true
  - language: ruby
    registry: rubygems
    name: prometheus-client
    url: https://rubygems.org/gems/prometheus-client
    install: gem install prometheus-client
    source: https://github.com/prometheus/client_ruby
    official: true
  - language: rust
    registry: crates.io
    name: prometheus-client
    url: https://crates.io/crates/prometheus-client
    install: cargo add prometheus-client
