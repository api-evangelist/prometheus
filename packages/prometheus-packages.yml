    official: true
binaries:
  - name: prometheus
    description: Prometheus server binary (scraper, TSDB, PromQL, HTTP API).
    distribution: github-releases
    url: https://github.com/prometheus/prometheus/releases
    docker: prom/prometheus
    official: true
  - name: promtool
    description: >-
      First-party CLI shipped alongside the server for config/rule validation,
      querying, TSDB inspection, and PromQL formatting. See cli/prometheus-cli.yml.
    distribution: github-releases
    url: https://github.com/prometheus/prometheus/releases
    official: true
  - name: pushgateway
    description: Prometheus Pushgateway server binary for batch-job metrics.
    distribution: github-releases
    url: https://github.com/prometheus/pushgateway/releases
    docker: prom/pushgateway
    official: true
  - name: alertmanager
    description: Prometheus Alertmanager server binary for alert routing and silencing.
    distribution: github-releases
    url: https://github.com/prometheus/alertmanager/releases
    docker: prom/alertmanager
