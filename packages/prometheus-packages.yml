description: >-
  Official Prometheus client instrumentation libraries and first-party command-line
  binaries. Client libraries implement the Prometheus metric types (Counter, Gauge,
  Histogram, Summary) and expose metrics over an HTTP endpoint for scraping. Only the
  five libraries under github.com/prometheus/* are official; many community libraries
  exist for other languages.
packages:
