stability:
  policy_url: https://prometheus.io/docs/prometheus/latest/stability/
  summary: >-
    Prometheus promises API stability within a major version and avoids breaking changes
    for key features. Cosmetic, experimental, or third-party-dependent features are
    excluded. The /alerts and /rules HTTP API endpoints carry weaker guarantees than the
    overarching v1 API because they are newer.
  experimental_features_excluded: true
